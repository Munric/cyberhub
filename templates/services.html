{% extends 'base.html' %}

{% block content %}

<div style="padding:40px; text-align:center;">
    <h2 style="color:#0a2a66;">Available Services</h2>

    <div style="
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        gap:20px;
        margin-top:30px;
    ">

        {% for service in services %}

        <div style="background:white; padding:20px; width:250px; border-radius:10px;">
            <h3>{{ service.name }}</h3>
            <p>{{ service.description }}</p>
            <p><strong>Ksh {{ service.price }}</strong></p>

            <a href="/orders/create/{{ service.id }}/" class="btn">Order</a>
        </div>

        {% endfor %}

    </div>
</div>

{% endblock %}
